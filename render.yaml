services:
  # Backend API (Express)
  - type: web
    name: e367-erp-api
    env: node
    buildCommand: cd server && npm install && npx prisma generate && npm run build
    startCommand: cd server && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: e367-erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://e367-erp.onrender.com
      - key: REDIS_URL
        value: redis://redistogo:placeholder@localhost:6379  # optional, app works without Redis

  # Frontend (Static Site)
  - type: web
    name: e367-erp
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://e367-erp-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: e367-erp-db
    databaseName: erp_db
    user: erp_user
    region: ohio
    plan: free
